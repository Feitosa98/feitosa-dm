version: '3.8'

services:
  feitosa-dm:
    build: .
    container_name: feitosa-directory-manager
    restart: unless-stopped
    privileged: true
    network_mode: "host"
    volumes:
      - samba_data:/var/lib/samba
      - samba_etc:/etc/samba
      - backend_db:/app/backend/data
    environment:
      - JWT_SECRET_KEY=feitosa_auto_generate_in_production
      - JWT_EXPIRE_HOURS=2.0

  caddy:
    image: caddy:2-alpine
    container_name: feitosa-caddy-proxy
    restart: unless-stopped
    network_mode: "host"
    command: caddy reverse-proxy --from :80 --to 127.0.0.1:8000
    # O Caddy ira automaticamente gerenciar um certificado local
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  samba_data:
  samba_etc:
  backend_db:
  caddy_data:
  caddy_config:
